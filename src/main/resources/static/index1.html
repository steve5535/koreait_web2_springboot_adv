<!DOCTYPE html>

<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>알림 테스트 (1단계)</title>
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; color: #222; max-width: 640px; }
    h2 { margin-bottom: 4px; }
    section { border: 1px solid #ddd; border-radius: 8px; padding: 14px 16px; margin-top: 14px; }
    section h3 { margin: 0 0 10px; font-size: 16px; }
    label { display: block; margin-top: 8px; font-weight: bold; font-size: 13px; }
    input { width: 260px; padding: 6px; margin-top: 4px; }
    button { padding: 6px 12px; margin: 10px 6px 0 0; cursor: pointer; }
    #log { margin-top: 14px; padding: 10px; border: 1px solid #ccc; border-radius: 8px;
           height: 220px; overflow-y: auto; font-family: Consolas, monospace; font-size: 13px; }
    #log div { padding: 1px 0; color: #555; }
    #log .notice { color: #1565c0; }   /* 전체 공지 */
    #log .error  { color: #c62828; }   /* 실패 */
  </style>
</head>
<body>
<h2>알림 테스트 (1단계: 전체 방송)</h2>

<section>
  <h3>① 접속</h3>
  <button type="button" onclick="connect()">연결</button>
  <button type="button" onclick="disconnect()">종료</button>
</section>

<section>
  <h3>② 전체 공지</h3>
  <label for="broadcastMessage">내용</label>
  <input id="broadcastMessage" value="안녕하세요">
  <button type="button" onclick="sendBroadcast()">전체 보내기</button>
</section>

<div id="log"></div>

<script>
  var stompClient = null;

  function writeLog(text, cssClass) {
      var line = document.createElement("div");
      if (cssClass) line.className = cssClass;
      line.textContent = text;
      var log = document.getElementById("log");
      log.appendChild(line);
      log.scrollTop = log.scrollHeight;
  }

  function connect() {
      var socket = new SockJS("/ws");
      stompClient = Stomp.over(socket);
      stompClient.connect(
          {},
          function () {
              writeLog("연결 완료");
              stompClient.subscribe("/topic/notifications", function (msg) {
                  writeLog(JSON.parse(msg.body).message, "notice");
              });
          },
          function () { writeLog("연결 실패", "error"); }
      );
  }


  function sendBroadcast() {
      fetch("/notifications", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: document.getElementById("broadcastMessage").value })
      }).then(function (res) {
          if (!res.ok) throw new Error("전송 실패");
      }).catch(function (e) { alert(e.message); });
  }

  function disconnect() {
      if (stompClient != null) stompClient.disconnect(function () { writeLog("종료"); });
  }
</script>
</body>
</html>
